name: Setup
description: Install Bun, cache dependencies, and install packages

inputs:
  node:
    description: Install Node.js (needed for semantic-release)
    default: 'false'

runs:
  using: composite
  steps:
    - if: inputs.node == 'true'
      uses: actions/setup-node@v4
      with:
        node-version: 'lts/*'

    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.7

    - name: Cache Bun dependencies
      uses: actions/cache@v5
      with:
        path: ~/.bun/install/cache
        key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
        restore-keys: |
          bun-${{ runner.os }}-

    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile
