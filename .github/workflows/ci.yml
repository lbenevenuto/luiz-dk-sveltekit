name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@master

      - uses: ./.github/actions/setup

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run check
        env:
          PUBLIC_SENTRY_DSN: ${{ vars.PUBLIC_SENTRY_DSN }}
          SALT: ${{ secrets.SALT }}
          BASE_URL: ${{ vars.BASE_URL }}

      - name: Test with coverage thresholds
        run: bun run test

      - name: Build
        run: bun run build
        env:
          PUBLIC_SENTRY_DSN: ${{ vars.PUBLIC_SENTRY_DSN }}
          SALT: ${{ secrets.SALT }}
          BASE_URL: ${{ vars.BASE_URL }}

  release:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@master
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup
        with:
          node: 'true'

      - name: Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
