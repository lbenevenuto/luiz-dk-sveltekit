name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@master

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.7

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run check
        env:
          PUBLIC_SENTRY_DSN: ${{ vars.PUBLIC_SENTRY_DSN }}
          SALT: ${{ secrets.SALT }}
          BASE_URL: ${{ vars.BASE_URL }}

      - name: Test with coverage thresholds
        run: bun run test

      - name: Build
        run: bun run build
        env:
          PUBLIC_SENTRY_DSN: ${{ vars.PUBLIC_SENTRY_DSN }}
          SALT: ${{ secrets.SALT }}
          BASE_URL: ${{ vars.BASE_URL }}

  release:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@master
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.7

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Append contributors to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$TAG" ]; then exit 0; fi

          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")

          AUTO_NOTES=$(gh api repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name="$TAG" \
            ${PREV_TAG:+-f previous_tag_name="$PREV_TAG"} \
            --jq '.body')

          CONTRIBUTORS=$(echo "$AUTO_NOTES" | sed -n '/## New Contributors/,$ p; /\*\*Full Changelog\*\*/,$ p' | head -50)
          if [ -z "$CONTRIBUTORS" ]; then
            CONTRIBUTORS=$(echo "$AUTO_NOTES" | grep -A 100 '^\*\*Full Changelog\*\*' | head -5)
          fi

          if [ -n "$CONTRIBUTORS" ]; then
            CURRENT_BODY=$(gh release view "$TAG" --json body --jq '.body')
            UPDATED_BODY="${CURRENT_BODY}

          ${CONTRIBUTORS}"
            gh release edit "$TAG" --notes "$UPDATED_BODY"
          fi
